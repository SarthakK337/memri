name: CI

on:
  push:
    branches: [main, v0.2]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Debug imports
        run: |
          python -c "from memri.config import MemriConfig; print('config OK')"
          python -c "from memri.storage.sqlite_store import SQLiteStore; print('store OK')"
          python -c "from memri.core.memory import MemriMemory; print('memory OK')"
        env:
          ANTHROPIC_API_KEY: test-fake-key-for-ci

      - name: Run tests
        run: pytest tests/ -v --tb=long --ignore=tests/benchmarks
        env:
          ANTHROPIC_API_KEY: test-fake-key-for-ci
          GEMINI_API_KEY: test-fake-key-for-ci
          OPENAI_API_KEY: test-fake-key-for-ci
